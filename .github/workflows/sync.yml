name: Eden Sync to GDrive

on:
  schedule:
    - cron: '0 0,12 * * *' # Run twice a day at 00:00 and 12:00 UTC
  workflow_dispatch: # Allow manual trigger from the GitHub UI

permissions:
  contents: write # Needed to push the version.txt update back to the repo

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run sync script
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python main.py
        
      - name: Commit version update
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '141870+github-actions[bot]@users.noreply.github.com'
          git add version.txt
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit (version is up to date)"
          else
            git commit -m "chore: update Eden AppImage version"
            git push
          fi
